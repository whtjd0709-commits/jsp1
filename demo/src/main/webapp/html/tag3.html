<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>table 태그(표만들기)</title>
</head>

<body>
    <!-- 테이블 태그로 표 만들기 -->
    <!-- thead, tbody 태그로 테이블의 제목(컬럼)과 내용(tbody는 데이터)을 구분-->
    <table border="1">
        <!-- tr 태그는 row(record-데이터들) -->
        <thead>
            <tr>
                <!-- th 태그는 column 이름을 나타낼때 : 굵은 글씨에 가운데 정렬 -->
                <th>이름</th>
                <th>성별</th>
                <th>주소</th>
                <th>나이</th>
            </tr>
        </thead>
        <!-- 아래에 td로 사용된 부분은 데이터 : 별다른 효과는 없이 데이터를 표기 -->
        <tbody>
            <tr>
                <!-- column 속한 값(데이터)들 표기-->
                <td>홍길동</td>
                <td>남</td>
                <td>율도국</td>
                <td>35</td>
            </tr>
            <tr>
                <td>홍길남</td>
                <td>여</td>
                <td>율도국</td>
                <td>18</td>
            </tr>
            <tr>
                <td>홍삼동</td>
                <td>남</td>
                <td>서울</td>
                <td>25</td>
            </tr>
            <tr>
                <td>홍길국</td>
                <td>남</td>
                <td>율도국</td>
                <td>14</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
