<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8">
        <title>리스트(list) CSS</title>
        <style>
            .unorder{
                list-style-type: square;
                list-style-image: url(image/heart_icon.png);
                list-style-position: inside;
            }
            .order{
                list-style-type: lower-roman;
            }
            #in{
                list-style: square inside;
            }
        </style>
    </head>
    
    <body>
        <h3>Unorderd list(순서없는 리스트)</h3>
            <ul class="unorder">
                <li id="in">첫번째</li>
                <li>두번째</li>
                    <ul>
                        <li>1번</li>
                        <li>2번</li>
                        <li>3번</li>
                    </ul>
                <li>세번째</li>
            </ul>
        
        <h3>orderd list</h3>
            <ul class="order">
                <li>첫번째</li>
                <li>두번째</li>
                    <ul>
                        <li>1번</li>
                        <li>2번</li>
                        <li>3번</li>
                    </ul>
                <li>세번째</li>
            </ul>

    </body>
</html>
