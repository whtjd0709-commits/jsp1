<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>인접 선택자</title>
        
        <style>
            body{
                font-size: 0.75rem;
            }
            article{
                border: 1px solid brown;
                margin: 10px 0px;
            }
            .main{
                background-color: gainsboro;
            }
            article h1+section{
                color: blueviolet;
            }
            /*인접 선택자 사용시 지정된 태그 다음 태그가 존재해야함.*/
            section p+h2{
                color: blueviolet;
            }

            /*형제 자매 선택자*/
            article~article h2{
                color: white;
                background-color: coral;
                padding: 5px;
            }
            
        </style>
    </head>
    <body>
        <article>
            <h1>첫번째 본문 제목</h1>
            <section>
                <h2>소제목</h2>
                <p>section 내용 1</p>
                <p>section 내용 2</p>
            </section>
            <section>
                <h2>소제목2</h2>
                <p>section 내용 2</p>
            </section>
            <section>
                <h2>소제목3</h2>
                <p>section 내용 3</p>
            </section>
        </article>
        <article>
            <h1>두번째 본문 제목</h1>
            <section>
                <h2>소제목</h2>
                <p>section 내용 1</p>
            </section>
            <section>
                <h2>소제목2</h2>
                <p>section 내용 2</p>
                <p>section 내용2-1</p>
            </section>
            <section>
                <h2>소제목3</h2>
                <p>section 내용 3</p>
            </section>
        </article>
        <div class="main">
            <h2>여기가 메인</h2>
            <p>메인 section 내용</p>
        </div>
        <article>
            <h1>세번째 본문 제목</h1>
            <section>
                <h2>소제목</h2>
                <p>section 내용 1</p>
            </section>
            <section>
                <h2>소제목2</h2>
                <p>section 내용 2</p>
            </section>
            <section>
                <h2>소제목3</h2>
                <p>section 내용 3</p>
            </section>
        </article>
    </body>
