<!-- HTML은 태그를 통해서 엘리먼트 표기-->
<!-- <DOCTYPE html> 은 지금부터 사용되는 문서의 타입-->

<!DOCTYPE html>  
    <html lang="ko">
    <!-- html 두가지 요소
        head : 웹 페이지의 메타정보를 정의
        body : 실제 데이터를 처리하는 역할.
    --> 

    <head>
        <!-- 자식 : title, meta, link -->
        <!-- style, script 등의 태그를 넣기도함. -->
         <title>HTML 테스트 문서</title>
         <meta charset="UTF-8">
    </head>
    <body>
        <!-- h1 ~ h6(크기) 제목 태그 사용 -->
        <h1>HTML 테스트 문서입니다.</h1>
        <h2>두번째 제목입니다.</h2>
        <h3>세번째 제목입니다.</h3>
        <h4>네번째 제목입니다.</h4>
        <h5>다섯번째 제목입니다.</h5>
        <h6>여섯번째 제목입니다.</h6>
        <p> p: 문단을 나타내는 태그입니다.</p>
        <Strong> Strong: 강조하는 텍스트입니다.</Strong><br>
        <b> b: 굵은 글씨 태그입니다.</b> <br>
        <u> u: 밑줄을 넣는 태그입니다.</u>
        <i> i: 이탤릭체 태그입니다.</i>
        <br> <!-- 줄바꿈 태그 -->
    </body>
    </html>
