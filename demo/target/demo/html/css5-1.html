<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>position 속성 top, left 적용한 후 모습</title>
    <style>
        .bigbox{
            width: 100%;
            height: 150px;
            border: 1px solid red;

        }
        
        .box1, .box2, .box3{
            width: 100px;
            height: 100px;
            border: 1px solid blue;
            margin: 10px;
            display: inline-block;
            /* left: 50px; */
        }
        .box1{
            position: fixed;
            background-color: red;
            top: 30px;
            left: 0px;
        }
        .box2{
            position: fixed;
            background-color: blue;
            /* top: 10px; */
            /* left: 120px; */
        }
        .box3{
            /* position: relative; */
            background-color: green; 
            top: 50px;
        }
        .bigbox .box3{
            position: sticky;
            background-color: green;

        }
    </style>
</head>

<body>

    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="bigbox">
        <div class="box1"></div>
    </div>
    <div class="bigbox">
        <div class="box2"></div>
    </div>
    <div class="bigbox">
        <div class="box3"></div>
    </div>

</body>

</html>
