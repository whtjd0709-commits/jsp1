<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>table 태그(표만들기)</title>
</head>
<body>
    
    <!-- 테이블 태그로 표 만들기 -->    
    <!-- thead, tbody, tr, th, td -->
    <table border="1">
        <!-- tr 태그는 row(record - 데이터들) -->
         <tr>
            <!-- th 태그는 table header -->
            <th>이름</th>
            <th>나이</th>
            <th>직업</th>
         </tr>

            <tr>
                <!-- td 태그는 table data -->
                <td>홍길동</td>
                <td>25</td>
                <td>학생</td>
            </tr>
            <tr>
                <td>김철수</td>
                <td>30</td>
                <td>개발자</td>
            </tr>
            <tr>
                <td>이영희</td>
                <td>28</td>
                <td>디자이너</td>
            </tr>
            <tr>
                <td>박민수</td>
                <td>35</td>
                <td>매니저</td> 
            </tr>

    </table>

</body>

</html>
