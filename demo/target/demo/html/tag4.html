<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인라인 태그와 블럭 태그</title>

</head>
<body>
    <!-- 블럭 태그(요소)
        블럭 또는 인라인 태그를 자식으로 가질 수 있고,
        영역이 그 라인 전체를 가지고 있는 태그를 의미함. 
    -->
    <h1>블럭1</h1>
    <h2>블럭2</h2>

    <!-- ul : 순서가 없는 리스트 태그 -->
    <ul>
        <li>리스트 아이템1</li>
        <li>리스트 아이템2</li>
        <li>리스트 아이템3</li>
    </ul>

    <!-- ol : 순서가 있는 리스트 태그 -->
    <ol>
        <li>순서 있는 리스트 아이템1</li>
        <li>순서 있는 리스트 아이템2</li>
        <li>순서 있는 리스트 아이템3</li>
    </ol>

    <table>
        <tr>
            <td>테이블 데이터1</td>
            <td>테이블 데이터2</td>
            <td>테이블 데이터3</td>
        </tr>
    </table>

    <!--form 사용자의 입력값을 처리할 때 사용하는 태그.-->
    <form>
        <p>블럭</p>
    </form>

    <!-- 이외의 블럭 태그 : div 
        div : 구역을 나누는 태그
        이름을 지어서 스타일링이나 스크립트 적용 가능 
    -->  
    <div>
        <p>블럭</p>
    </div>

    <!-- 인라인 태그(요소)
        인라인 또는 블럭 태그를 자식으로 가질 수 없고,
        영역이 그 라인 전체를 차지하지 않는 태그를 의미함.
    -->
    <span>인라인</span>
    <a href="#">인라인</a>
    <img src="#" alt="인라인">
    <strong>인라인</strong>
    <b>인라인</b>
    <u>인라인</u>
    <i>인라인</i>
</body>

</html>
