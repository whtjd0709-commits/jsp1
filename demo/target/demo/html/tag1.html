<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>image 태그 연습</title>
    </head>
    <body>
        <!-- image 태그 속성 : src, alt, width, height -->
        <!-- src : 이미지 파일의 경로를 지정 -->
        <!-- alt : 이미지가 로드되지 않을 때 대체 텍스트 -->
        <!-- width, height : 이미지의 크기 지정 -->

        <img src="images/sample1.jpg" alt="샘플 이미지 1" width="300" height="200">
        <img src="images/sample2.jpg" alt="샘플 이미지 2" width="300" height="200">
        <img src="images/sample3.jpg" alt="샘플 이미지 3" width="300" height="200">

        <!-- 
            a 태그 (anchor, 앵커) : 하이퍼링크를 생성하는 태그
            href 속성 : 링크할 URL을 지정
        -->
        <a href="tag2.html">다음 페이지로 이동</a>
        <a href="https://www.naver.com" target="_blank">네이버 사이트로 이동</a>
    </body>
</html>
