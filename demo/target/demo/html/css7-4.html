<!DOCTYPE html>
<html>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>속성 선택자 예제1</title>

    <style>
        section{
            margin: 20px 0;
        }
        section[id$='2']{
            background-color: gray;
            padding: 10px;
        }
        div[class]{
            padding: 5px;
            margin: 5px;
            border: 1px solid #ccc;
        }
        /*class 속성 값이 'l'로 시작하는 경우*/
        div[class^='l']{
            background-color: skyblue;
        }
        /*class 속성 값에 'i'을 가지고 있는 경우*/
        div[class*='2']{
            background-color: hotpink;
        }
        /*class 속성 값에 끝 값이 4인 경우*/
        div[class$='4']{
            background-color: hotpink;
            color: white;
        }
        div[class*='e'][class$='2']{
            background-color: blue;
            color: white;
        }
    </style>
</html>
<body>
    <section id="part1">
        <div class="lst1e">속성선택자1</div>
        <div class="lst2">속성선택자2</div>
        <div class="lst3">속성선택자3</div>
        <div class="lst4">속성선택자4</div>
    </section>
    
    <section id="part2">
        <div class="lst1e">속성선택자1</div>
        <div class="lst2">속성선택자2</div>
        <div class="lst3">속성선택자3</div>
        <div class="lst4">속성선택자4</div>
    </section>
</body>
